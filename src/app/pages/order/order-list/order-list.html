<p-toast />
<p-confirmdialog />
<div class="card">
  <app-order-filter [data]="{}" />

  <div class="p-0 md:p-4">
    <p-table #dt [loading]="loader()" [lazy]="true" [value]="orders()" [paginator]="true" selectionMode="single"
      (selectionChange)="selectOrder($event)" [metaKeySelection]="true" dataKey="id" [totalRecords]="total()"
      [rows]="rows" (onPage)="pageChange($event)">
      <ng-template #caption>
        <div class="flex items-center flex-wrap justify-between gap-4">
          <div
            class="flex flex-1 flex-wrap flex-col-reverse items-start gap-y-2 sm:flex-row sm:items-center sm:space-x-2">

            <p-iconfield>
              <p-inputicon class="pi pi-search" />
              <input type="text" pInputText placeholder="Search" />
            </p-iconfield>
            <div class="flex gap-x-2 flex-wrap gap-4">
              <p-selectbutton class="flex-wrap!" [(ngModel)]="selectedStatus" [options]="stateOptions"
                optionLabel="label" optionValue="value" aria-labelledby="basic" />
              <p-datepicker [iconDisplay]="'input'" [showIcon]="true" inputId="icondisplay"
                placeholder="Select date range" selectionMode="range" [readonlyInput]="true" />
            </div>
          </div>

          <div class="flex justify-end gap-2">
            <p-drawer header="Select Warehouse" [dismissible]="false" [closable]="false" [modal]="false"
              [visible]="visibleDrawer()" position="right">
              <p-select [required]="true" [options]="warehouse()" [(ngModel)]="warehouseId" optionLabel="name"
                optionValue="id" placeholder="Select a warehouse" class="w-full md:w-56" />

              <ng-template #footer>
                <div class="flex justify-end gap-2">
                  <p-button label="Cancel" icon="pi pi-times" severity="danger" outlined
                    (click)="visibleDrawer.set(false)" />
                  <p-button label="Create" icon="pi pi-check" outlined (click)="handleWarehouseChange()" />
                </div>
              </ng-template>
            </p-drawer>
            <p-button type="button" label="Create" severity="primary" icon="pi pi-plus" (click)="createOrder()" />
          </div>
        </div>


      </ng-template>
      <ng-template pTemplate="header">
        <tr>
          <th>Store</th>
          <th>Warehouse</th>
          <th>Creator</th>
          <th>Channel</th>
          <th>Status</th>
          <th>Total</th>
          <th>Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-order>
        <tr [pSelectableRow]="order">
          <td>{{ order.store.name }}</td>
          <td>{{ order.warehouse.name }}</td>
          <td>{{ order.cashier.role }}</td>
          <td>{{ order.channel }}</td>
          <td><p-tag [value]="order.status" [severity]="getSeverity(order.status)"></p-tag></td>
          <td>{{ order.totalAmount | currency: " " : 'code' : '0.0' }}</td>
          <td>
            <p-button [disabled]="order.status === 'COMPLETED' || order.status === 'CANCELLED'" [rounded]="true"
              [outlined]="true" icon="pi pi-trash" severity="danger" (click)="confirmDeleteOrder($event, order)" />
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

</div>
