<form class="card" [formGroup]="additionalServicesForm">
  <div class="flex items-center gap-4 mb-4">
    <h5 class="mb-0!">{{ 'order.additionalServices' | transloco }}</h5>
    <p-toggleswitch class="min-w-[34px]" id="isActive" formControlName="isActive">
      <ng-template #handle let-checked="checked">
        <i [ngClass]="['!text-xs', 'pi', checked ? 'pi-check' : 'pi-times']"></i>
      </ng-template>
    </p-toggleswitch>
    <p-button [disabled]="!isActive.value" (click)="addService()" icon="pi pi-plus" />
  </div>
  <div formArrayName="services" class="flex flex-col">
    @for (item of additionalServices.controls; track item; let i = $index) {
    <div class="flex items-center flex-wrap gap-4" [formGroupName]="i">
      <div class="flex flex-col gap-4">
        <div class="flex items-center flex-wrap gap-4">
          <p-floatlabel variant="on">
            <input pInputText id="name_label" formControlName="name" autocomplete="off" />
            <label for="name_label">{{'order.serviceName' | transloco}}</label>
          </p-floatlabel>
          <p-floatlabel variant="on">
            <p-inputnumber inputId="price_label" formControlName="price" autocomplete="off" />
            <label for="price_label">{{'order.servicePrice' | transloco}}</label>
          </p-floatlabel>
        </div>
        <div>
          <p-floatlabel variant="on">
            <textarea pTextarea id="description" formControlName="description" style="resize: none"></textarea>
            <label for="description">{{'order.serviceDescription' | transloco}}</label>
          </p-floatlabel>
        </div>
      </div>
      <div>
        <p-button [disabled]="!isActive.value" icon="pi pi-trash" severity="danger" outlined
          (click)="removeService(i)" />
      </div>
    </div>
    @if(!$last) {
    <p-divider />
    }
    }
  </div>
</form>
