<p-toast />
<div class="card" [formGroup]="productForm">
  <div class="font-semibold text-xl">Tovarlar yaratish</div>

  <app-loader [loading]="false">
    <p-fluid>
      <div class="flex ">
        <div class="p-6 flex flex-col gap-6 w-full">

          <div class="flex flex-col md:flex-row gap-6">
            <div class="flex flex-wrap gap-3 w-full">
              <label for="store">Store</label>
              <p-select id="store" formControlName="store" [options]="stores()" optionLabel="name"
                [class]="productForm.controls.store.touched && productForm.controls.store.invalid ? 'ng-dirty ng-invalid' : ''" />
            </div>
            <div class="flex flex-wrap gap-2 w-full">
              <label for="category">Category</label>
              <p-treeselect id="category" class="w-full" formControlName="category" [options]="categories()"
                placeholder="Select last child category" />
            </div>

            <div class="flex flex-wrap gap-2 w-full">
              <label for="brand">Brand</label>
              <p-select id="brand" formControlName="brand" [options]="brands()" optionLabel="name"
                [class]="productForm.controls.brand.touched && productForm.controls.brand.invalid ? 'ng-dirty ng-invalid' : ''" />
            </div>
            <div class="flex flex-wrap gap-3 w-full">
              <label for="name">Name</label>
              <input pInputText id="name" type="text" formControlName="name"
                [class]="productForm.controls.name.touched && productForm.controls.name.invalid ? 'ng-dirty ng-invalid' : ''" />
            </div>
          </div>

        </div>
      </div>


      <div class="col-span-full lg:col-span-6">
        <div class="p-6">
          <app-file-upload [storeId]="productForm.controls.store.value?.id" [cancel]="uploadedFilesCancel$"
            (uploadComplete)="onUpload($event)" />
        </div>
      </div>

      <div class="flex flex-wrap justify-end gap-2 w-full">
        <p-button label="Bekor qilish" severity="secondary" (onClick)="clearForm()"></p-button>
        <p-button label="Tasdiqlash" (onClick)="submit()"></p-button>
      </div>
    </p-fluid>
  </app-loader>
</div>
