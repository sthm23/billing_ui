<p-toast />
<div class="p-4">
  <p-table #dt [lazy]="true" [value]="products" [tableStyle]="{ 'min-width': '50rem' }" [loading]="appStore.isLoading()"
    [paginator]="true" [totalRecords]="total()" [rows]="rows" (onPage)="pageChange($event)">
    <ng-template #header>
      <tr>
        <th style="width:25%">Name</th>
        <th style="width:25%">Phone</th>
        <th style="width:25%">Created At</th>
        <th style="width:25%">Type</th>
      </tr>
    </ng-template>
    <ng-template #body let-product>
      <tr>
        <td>{{ product.fullName }}</td>
        <td>{{ product.phone }}</td>
        <td>{{ product.createdAt }}</td>
        <td>{{ product.type }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
