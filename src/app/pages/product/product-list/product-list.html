<p-toast />
<div class="p-4">
  <p-table #dt [lazy]="true" [value]="products" [tableStyle]="{ 'min-width': '50rem' }" [loading]="appStore.isLoading()"
    [paginator]="true" [totalRecords]="total()" [rows]="rows" (onPage)="pageChange($event)">
    <ng-template #header>
      <tr>
        <th style="width:12%">Name</th>
        <th style="width:12%">Img</th>
        <th style="width:13%">Brand</th>
        <th style="width:10%">Category</th>
        <th style="width:10%">In Stock</th>
        <th style="width:15%">Created At</th>
        <th style="width:5%">Action</th>
      </tr>
    </ng-template>
    <ng-template #body let-product>
      <tr>
        <td>{{ product.name }}</td>
        <td><img [src]="getProductImg(product)" [alt]="product.name" width="50"
            class="shadow-lg object-cover h-[40px]" />
        </td>
        <td>{{ product.brand }}</td>
        <td>{{ product.category }}</td>
        <td> <p-badge [value]="product.variants" [severity]="getSeverity(product.variants)" /></td>
        <td>{{ product.createdAt | date:'dd-MM-yyyy' }}</td>
        <td><p-button icon="pi pi-pencil" [rounded]="true" [outlined]="true" (onClick)="goToProductView(product)" />
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
