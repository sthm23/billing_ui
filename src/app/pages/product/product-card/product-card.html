@let product = productCard();

<div class="card flex flex-wrap gap-4 justify-content-center">

  <div class="card">
    <div class="h-48 w-48 overflow-hidden">
      <p-image [src]="getImageUrl(product)" [alt]="product.name" class="object-cover w-full h-full" [preview]="true" />
    </div>
    <div class="card-body">
      <h5 class="card-title">{{ product.name }}</h5>
      <p class="card-text">{{ 'No description available' }}</p>
      <ul class="list-group list-group-flush">
        <li class="list-group-item">Category: {{ product.category }}</li>
        <li class="list-group-item">Price: -</li>
        <li class="list-group-item">Stock: -</li>
      </ul>

      <div class="flex gap-2 mt-4">
        <p-button outlined="true">
          <i class="pi pi-pencil"></i>
          <span>Edit</span>
        </p-button>
        <p-button outlined="true" severity="danger">
          <i class="pi pi-trash"></i>
          <span>Delete</span>
        </p-button>
      </div>
    </div>
  </div>

  <div class="card w-full">second part</div>

</div>
