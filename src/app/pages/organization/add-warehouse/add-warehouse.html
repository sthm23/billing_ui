<p-drawer [(visible)]="visible" [closable]="false" (visibleChange)="visibleChange.emit($event)">
  <ng-template #header>
    <div class="flex items-center gap-2">
      <i class="pi pi-shop"></i>
      <span class="font-bold">Add warehouse</span>
    </div>
  </ng-template>
  <div class="flex flex-col gap-4">
    <span>Store ID: {{ storeId }}</span>
    <input pInputText placeholder="Warehouse name" [(ngModel)]="name" class="w-full" />
  </div>
  <ng-template #footer>
    <div class="flex items-center gap-2">
      <button pButton label="cancel" class="w-full" severity="danger" text (click)="cancel()"></button>
      <button pButton label="Create" class="w-full" outlined (click)="create()" [loading]="loader()"
        loadingIcon="pi pi-spinner"></button>
    </div>
  </ng-template>
</p-drawer>
