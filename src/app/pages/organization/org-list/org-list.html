<div class="card min-h-[80vh]">
  <p-table #dt [lazy]="true" [value]="stores" [tableStyle]="{ 'min-width': '50rem' }" [loading]="appStore.isLoading()"
    [paginator]="true" [totalRecords]="total()" [rows]="rows" (onPage)="pageChange($event)">
    <ng-template #header>
      <tr>
        <th style="width:25%">Name</th>
        <th style="width:25%">staff</th>
        <th style="width:25%">warehouse</th>
        <th style="width:25%">Created At</th>
        <th style="width:25%">Action</th>
      </tr>
    </ng-template>
    <ng-template #body let-store>
      <tr>
        <td>{{ store.name }}</td>
        <td>{{ store.staff.length }}</td>
        <td>{{ store.warehouse.name }}</td>
        <td>{{ store.createdAt }}</td>
        <td>
          <button pButton type="button" icon="pi pi-info-circle" class="p-button-rounded p-button-primary p-mr-2"
            (click)="goToOrgSchema(store)"></button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
