<p-toast />
<div class="card" [formGroup]="storeForm">
  <div class="font-semibold text-xl">Create store</div>

  <app-loader [loading]="false">
    <p-fluid>
      <div class="flex ">
        <div class="p-4 flex flex-col gap-6 w-full">

          <div class="flex flex-col md:flex-row gap-6">
            <div class="flex flex-wrap gap-3 w-full">
              <label for="name">Store name</label>
              <input pInputText id="name" type="text" formControlName="name" [class]="isValidField('name')" />
            </div>

            <div class="flex flex-wrap gap-3 w-full" formGroupName="wareHouse">
              <label for="name">Warehouse name</label>
              <input pInputText id="name" type="text" formControlName="name" [class]="isValidField('name')" />
            </div>

            <div class="flex flex-wrap gap-2 w-full">
              <label for="ownerId">Owners</label>
              <p-select id="ownerId" formControlName="ownerId" [options]="ownerList()" optionLabel="name"
                placeholder="Choose one" class="w-full" [class]="isValidField('ownerId')"></p-select>
            </div>


            <div class="flex flex-wrap gap-2 w-full">
              <label for="categoryId">Category</label>
              <p-treeselect id="categoryId" class="w-full" formControlName="categoryId"
                [class]="isValidField('categoryId')" [options]="categoryList()"
                placeholder="Select last child category" />
            </div>
          </div>

          <div class="flex flex-col md:flex-row gap-6">
            <div class="flex flex-wrap gap-2 w-full">
              <label for="brands">Brands</label>
              <p-multiselect [options]="brandList()" formControlName="brands" optionLabel="name"
                placeholder="Select brands" [maxSelectedLabels]="3" class="w-full md:w-80"
                [class]="isValidField('brands')" />
            </div>
            <div class="flex flex-wrap gap-2 w-full">
              <label for="attributeIds">Attributes</label>
              <p-multiselect [options]="attributeList()" formControlName="attributeIds" optionLabel="name"
                placeholder="Select attributes" [maxSelectedLabels]="3" class="w-full md:w-80"
                [class]="isValidField('attributeIds')" />
            </div>

          </div>
        </div>
      </div>

      <div class="flex flex-wrap justify-end gap-2 w-full">
        <p-button label="Bekor qilish" variant="outlined" (onClick)="clearForm()"></p-button>
        <p-button label="Tasdiqlash" severity="contrast" (onClick)="submitForm()"></p-button>
      </div>
    </p-fluid>
  </app-loader>
</div>
