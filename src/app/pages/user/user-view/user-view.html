<p-toast />
<div class="card h-full">
  <p-organization-chart [value]="orgTree()" [collapsible]="true">
    <ng-template let-node pTemplate="default">
      <div class="flex flex-col items-center">
        <div class="mt-4 font-medium text-lg">{{ node.label }}</div>
        <div class="mt-4 font-medium text-lg">{{ node.data.level }}</div>

        @if((node.data.level == orgLevel.OWNER && !user()?.staff)|| node.data.level == orgLevel.WAREHOUSE) {
        <p-button class="mt-4" aria-label="add" [pTooltip]="textToolTip(node.data.level) || ''" variant="outlined"
          severity="success" (onClick)="addNode(node)">
          <i class="pi pi-plus"></i>
        </p-button>
        }
      </div>
    </ng-template>
  </p-organization-chart>
</div>

<p-dialog [header]="currentLevel === orgLevel.OWNER ? 'Create store': 'Create warehouse'" [modal]="true"
  [(visible)]="visible" [style]="{ width: '25rem' }" [formGroup]="createOrgForm">
  <div class="flex items-center gap-4 mb-4">
    <label for="name" class="font-semibold w-24">Name</label>
    <input formControlName="name" pInputText id="name" class="flex-auto" autocomplete="off" />
  </div>
  <div class="flex justify-end gap-2">
    <p-button label="Cancel" severity="secondary" (click)="closeModal()" />
    <p-button label="Save" (click)="submitModal()" />
  </div>
</p-dialog>
