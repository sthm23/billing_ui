<div class="card h-full">
  <p-organization-chart [value]="orgTree()" [collapsible]="true">
    <ng-template let-node pTemplate="default">
      <div class="flex flex-col items-center">
        <div class="mt-4 font-medium text-lg">{{ node.label }}</div>
        <div class="mt-4 font-medium text-lg">{{ node.data.level }}</div>

        @if(node.data.level !== orgLevel.STAFF) {
        <p-button class="mt-4" aria-label="add" [pTooltip]="textToolTip(node.data.level) || ''" variant="outlined"
          severity="success" (onClick)="addNode(node.key)">
          <i class="pi pi-plus"></i>
        </p-button>
        }
      </div>
    </ng-template>
  </p-organization-chart>
</div>
