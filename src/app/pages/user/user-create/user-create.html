<p-toast />
<div class="card" [formGroup]="userForm">
  <div class="flex items-center gap-4 flex-1">
    <p-button text icon="pi pi-arrow-left" (onClick)="goToList()" />
    <h4 class="m-0!">{{'user.createTitle' | transloco}}</h4>
  </div>

  <app-loader [loading]="false">
    <p-fluid>
      <div class="flex ">
        <div class="p-4 flex flex-col gap-6 w-full">

          <div class="flex flex-col md:flex-row gap-6">
            <div class="flex flex-wrap gap-2 w-full">
              <label for="role">{{'user.role' | transloco}}</label>
              <p-select id="role" formControlName="role" [options]="userRole" optionLabel="label" [group]="true"
                [placeholder]="'user.selectOne' | transloco" class="w-full" [class]="isValidField('role')"></p-select>
            </div>
            <div class="flex flex-wrap gap-3 w-full">
              <label for="fullName">{{'user.name' | transloco}}</label>
              <input pInputText id="fullName" type="text" formControlName="fullName"
                [class]="isValidField('fullName')" />
            </div>
            <div class="flex flex-wrap gap-3 w-full">
              <label for="phone">{{'user.phone' | transloco}}</label>
              <p-inputmask [class]="isValidField('phone')" id="phone" mask="(99)-999-9999" formControlName="phone"
                placeholder="(99)-999-9999" />

            </div>
          </div>

          <div class="flex flex-col md:flex-row gap-6">
            <div class="flex flex-wrap gap-2 w-full">
              <label for="login">{{'user.login' | transloco}}</label>
              <input [class]="isValidField('login')" pInputText id="login" type="text" formControlName="login" />
            </div>
            <div class="flex flex-col gap-2 w-full">
              <label for="password">{{'user.password' | transloco}}</label>
              <p-password [class]="isValidField('password')" id="password" [feedback]="false" [toggleMask]="true"
                formControlName="password" />
            </div>

          </div>
          @if(isShopHidden) {
          <div class="flex flex-col md:flex-row gap-6" [formGroup]="staff">
            <div class="flex flex-wrap gap-2 w-full">
              <label for="storeId">{{'user.store' | transloco}}</label>
              <p-select id="storeId" formControlName="storeId" [options]="storeList()" optionLabel="name"
                [placeholder]="'user.selectOne' | transloco" class="w-full" [class]="isValidField('role')"></p-select>
            </div>
            <div class="flex flex-wrap gap-2 w-full">
              <label for="warehouseId">{{'user.warehouse' | transloco}}</label>
              <p-select id="warehouseId" formControlName="warehouseId" [options]="warehouses()" optionLabel="name"
                [placeholder]="'user.selectOne' | transloco" class="w-full" [class]="isValidField('role')"></p-select>
            </div>
          </div>
          }
        </div>
      </div>

      <div class="flex flex-wrap justify-end gap-2 w-full">
        <p-button label="{{'user.cancel' | transloco}}" variant="outlined" (onClick)="clearForm()"></p-button>
        <p-button label="{{'user.submit' | transloco}}" severity="contrast" (onClick)="submitForm()"></p-button>
      </div>
    </p-fluid>
  </app-loader>
</div>
