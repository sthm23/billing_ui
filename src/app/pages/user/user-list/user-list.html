<div class="card min-h-[80vh]">
  <p-table #dt [lazy]="true" [value]="users" [tableStyle]="{ 'min-width': '50rem' }" [loading]="appStore.isLoading()"
    [paginator]="true" [totalRecords]="total()" [rows]="rows" (onPage)="pageChange($event)">
    <ng-template #caption>
      <div class="flex justify-end gap-2">
        <p-button label="Create user" icon="pi pi-plus" (onClick)="createUser()" />
      </div>
    </ng-template>
    <ng-template #header>
      <tr>
        <th style="width:25%">Name</th>
        <th style="width:25%">Phone</th>
        <th style="width:25%">Created At</th>
        <th style="width:25%">Type</th>
        <th style="width:25%">Action</th>
      </tr>
    </ng-template>
    <ng-template #body let-user>
      <tr>
        <td>{{ user.fullName }}</td>
        <td>{{ user.phone }}</td>
        <td>{{ user.createdAt }}</td>
        <td>{{ user.role }}</td>
        <td>
          @if(user.role === 'OWNER') {

          <button pButton type="button" icon="pi pi-objects-column" class="p-button-rounded p-button-info p-mr-2"
            (click)="goToOrgSchema(user)"></button>
          }@else {
          <span>-</span>
          }
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
