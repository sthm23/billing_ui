<div class="card">
  <p-table #dt [lazy]="true" [value]="users" [tableStyle]="{ 'min-width': '50rem' }" [loading]="appStore.isLoading()"
    [paginator]="true" [totalRecords]="total()" [rows]="rows" (onPage)="pageChange($event)">
    <ng-template #header>
      <tr>
        <th style="width:25%">Name</th>
        <th style="width:25%">Phone</th>
        <th style="width:25%">Created At</th>
        <th style="width:25%">Type</th>
      </tr>
    </ng-template>
    <ng-template #body let-user>
      <tr>
        <td>{{ user.fullName }}</td>
        <td>{{ user.phone }}</td>
        <td>{{ user.createdAt }}</td>
        <td>{{ user.type }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
