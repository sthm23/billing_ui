<div class="layout-topbar">
  <div class="layout-topbar-logo-container">
    <p-button class="layout-menu-button layout-topbar-action" [rounded]="true" [text]="true"
      (click)="layoutService.onMenuToggle()" size="small">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="18" x="3" y="3" rx="2"></rect>
        <path d="M9 3v18"></path>
      </svg>
    </p-button>
  </div>

  <div class="layout-topbar-actions">
    <div class="layout-config-menu">
      <button type="button" class="layout-topbar-action" (click)="toggleDarkMode()">
        <i
          [ngClass]="{ 'pi ': true, 'pi-moon': layoutService.isDarkTheme(), 'pi-sun': !layoutService.isDarkTheme() }"></i>
      </button>
    </div>

    <button class="layout-topbar-menu-button layout-topbar-action" pStyleClass="@next" enterFromClass="hidden"
      enterActiveClass="animate-scalein" leaveToClass="hidden" leaveActiveClass="animate-fadeout"
      [hideOnOutsideClick]="true">
      <i class="pi pi-ellipsis-v"></i>
    </button>

    <div class="layout-topbar-menu hidden lg:block">
      <div class="layout-topbar-menu-content">
        <button type="button" class="layout-topbar-action">
          <i class="pi pi-calendar"></i>
          <span>Calendar</span>
        </button>
        <button type="button" class="layout-topbar-action">
          <i class="pi pi-inbox"></i>
          <span>Messages</span>
        </button>
        <button type="button" class="layout-topbar-action">
          <i class="pi pi-user"></i>
          <span>Profile</span>
        </button>
        <button type="button" class="layout-topbar-action" (click)="handleExit()">
          <i class="pi pi-power-off"></i>
          <span>Exit</span>
        </button>
      </div>
    </div>
  </div>
</div>
