<div class="flex flex-row-reverse items-center gap-2">
  <p-button outlined type="button" icon="pi pi-plus" (click)="increment()"></p-button>
  <strong class="center text-sm sm:text-md ">{{ count() }}/{{ maxValue }}</strong>
  <p-button [outlined]="true" type="button" icon="pi pi-minus" (click)="decrement()"></p-button>
</div>
