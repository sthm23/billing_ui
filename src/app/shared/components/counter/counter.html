<div class="flex flex-row-reverse items-center gap-2">
  <p-button rounded type="button" icon="pi pi-plus" text (click)="increment()"></p-button>
  <strong class="center text-sm sm:text-md ">{{ count() }}</strong>
  <p-button rounded type="button" icon="pi pi-minus" text (click)="decrement()"></p-button>
</div>
