<p-dialog [header]="title" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }"
  (visibleChange)="visibleChange.emit($event)">
  @if(type === dialogType.USER_CREATE) {
  <span class="p-text-secondary block mb-8">{{subtitle}}</span>
  <div class="flex items-center gap-4 mb-4">
    <label for="username" class="font-semibold w-24">{{'user.name' | transloco}}</label>
    <input pInputText [(ngModel)]="data.name" id="username" class="flex-auto" autocomplete="off" />
  </div>
  <div class="flex items-center gap-4 mb-8">
    <label for="phone" class="font-semibold w-24">{{'user.phone' | transloco}}</label>
    <p-inputmask class="flex-auto" id="phone" mask="(99)-999-9999" [(ngModel)]="data.phone" autocomplete="off"
      placeholder="(99)-999-9999" />
  </div>
  }
  <div class="flex justify-end gap-2">
    <p-button [label]="'product.cancel' | transloco" severity="secondary" (click)="hideDialog()" />
    <p-button [label]="'order.save' | transloco" (click)="submit()" />
  </div>
</p-dialog>
