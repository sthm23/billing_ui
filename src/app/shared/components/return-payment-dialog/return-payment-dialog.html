<p-dialog header="Select Payment Method" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }"
  (visibleChange)="closeModal($event)">
  <form class="py-2" [formGroup]="paymentForm" (ngSubmit)="save()">
    <div class="flex items-center gap-4 mb-4">
      <p-selectbutton [options]="stateOptions" [multiple]="true" formControlName="paymentMethod" optionLabel="label"
        optionValue="value" aria-labelledby="basic" />
    </div>
    <div class="flex flex-col gap-4 mb-4" formGroupName="method">
      <div class="flex flex-col gap-4">
        <p-inputgroup>
          <p-inputnumber placeholder="Cash" formControlName="CASH" [invalid]="isValid('CASH')" />
          <p-inputgroup-addon><i class="pi pi-money-bill"></i></p-inputgroup-addon>
        </p-inputgroup>
        @if(isValid('CASH')) {
        <p-message severity="error" size="small" variant="simple">Selection is required</p-message>
        }
      </div>
      <div class="flex flex-col gap-4">
        <p-inputgroup>
          <p-inputnumber placeholder="Card" formControlName="CARD" [invalid]="isValid('CARD')" />
          <p-inputgroup-addon><i class="pi pi-credit-card"></i></p-inputgroup-addon>
        </p-inputgroup>
        @if(isValid('CARD')) {
        <p-message severity="error" size="small" variant="simple">Selection is required</p-message>
        }
      </div>
    </div>

    <div class="flex justify-end gap-2">
      <p-button label="Cancel" severity="secondary" (click)="closeModal(false)" />
      <p-button label="Save" (click)="save()" />
    </div>
  </form>
</p-dialog>
